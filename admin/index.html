<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NTEQ POLYMER - Full Content Management System</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;500;600;700&family=Poppins:wght@300;400;500;600&display=swap');

        :root {
            --nteq-green: #2e7d32;
            --nteq-light-green: #e8f5e9;
            --nteq-dark: #1b5e20;
            --text-main: #2c3e50;
            --gradient-btn: linear-gradient(135deg, #4caf50 0%, #2e7d32 100%);
        }

        body {
            font-family: 'Poppins', 'Noto Sans Thai', sans-serif;
            margin: 0;
            padding: 0;
            background-color: #fafdfa;
            color: var(--text-main);
            display: flex;
            min-height: 100vh;
        }

        .sidebar {
            width: 280px;
            background: linear-gradient(180deg, #1e4620 0%, #0f2b11 100%);
            color: #ffffff;
            position: fixed;
            height: 100vh;
            display: flex;
            flex-direction: column;
            box-shadow: 4px 0 15px rgba(0,0,0,0.05);
        }

        .sidebar-brand {
            padding: 30px 24px;
            font-size: 22px;
            font-weight: 700;
            letter-spacing: 1px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .sidebar-brand span { color: #81c784; }

        .sidebar-menu {
            list-style: none;
            padding: 0;
            margin: 30px 0;
            flex: 1;
        }

        .sidebar-menu li a {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 16px 28px;
            color: #b0bec5;
            text-decoration: none;
            font-size: 15px;
            transition: all 0.3s ease;
        }

        .sidebar-menu li.active a, .sidebar-menu li a:hover {
            color: #ffffff;
            background: rgba(255, 255, 255, 0.06);
            border-left: 5px solid #81c784;
        }

        .main-content {
            margin-left: 280px;
            flex: 1;
            padding: 40px;
            box-sizing: border-box;
        }

        .top-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
            border-bottom: 2px solid #e8f5e9;
            padding-bottom: 20px;
        }

        .top-header h1 {
            font-size: 28px;
            font-weight: 700;
            color: var(--nteq-dark);
            margin: 0;
        }

        .user-tag {
            background-color: var(--nteq-light-green);
            color: var(--nteq-green);
            padding: 8px 16px;
            border-radius: 30px;
            font-weight: 600;
            font-size: 14px;
        }

        .config-card {
            background: #ffffff;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 10px 30px rgba(46, 125, 50, 0.03);
            border: 1px solid #e8f5e9;
            max-width: 800px;
            margin-bottom: 30px;
        }

        .card-title {
            font-size: 18px;
            font-weight: 600;
            margin-top: 0;
            margin-bottom: 25px;
            color: var(--nteq-dark);
            display: flex;
            align-items: center;
            gap: 10px;
            border-bottom: 1px solid #f0f0f0;
            padding-bottom: 10px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #455a64;
            font-size: 14px;
        }

        .row-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
        }

        input[type="text"], textarea {
            width: 100%;
            padding: 12px 18px;
            border: 1px solid #c8e6c9;
            border-radius: 10px;
            box-sizing: border-box;
            font-family: inherit;
            font-size: 14px;
            background-color: #fafdfa;
            transition: all 0.3s ease;
        }

        input[type="text"]:focus, textarea:focus {
            outline: none;
            border-color: var(--nteq-green);
            background-color: #ffffff;
            box-shadow: 0 0 0 3px rgba(76, 175, 80, 0.1);
        }

        .btn-submit {
            background: var(--gradient-btn);
            color: white;
            padding: 15px 35px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 4px 12px rgba(46, 125, 50, 0.2);
            transition: all 0.3s ease;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(46, 125, 50, 0.3);
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="sidebar-brand">
            <i class="fa-solid fa-leaf"></i>
            <div>NTEQ <span>POLYMER</span></div>
        </div>
        <ul class="sidebar-menu">
            <li class="active"><a href="#"><i class="fa-solid fa-sliders"></i> จัดการหน้าแรกทั้งหมด</a></li>
            <li><a href="https://nteq-polymer-1.onrender.com/" target="_blank"><i class="fa-solid fa-arrow-up-right-from-square"></i> เปิดหน้าเว็บจริง</a></li>
        </ul>
    </div>

    <div class="main-content">
        <div class="top-header">
            <h1>ระบบจัดการเนื้อหา (Full CMS)</h1>
            <div class="user-tag"><i class="fa-solid fa-user-shield"></i> Master Admin</div>
        </div>

        <form id="full-admin-form">
            <div class="config-card">
                <div class="card-title"><i class="fa-solid fa-display"></i> 1. ส่วนต้อนรับด้านบน (Hero Section)</div>
                <div class="form-group">
                    <label>หัวข้อหลัก (Web Title)</label>
                    <input type="text" id="title" required>
                </div>
                <div class="form-group">
                    <label>ข้อความอธิบายย่อย (Sub-headline)</label>
                    <textarea id="announcement" rows="3" required></textarea>
                </div>
                <div class="form-group">
                    <label>ข้อความบนปุ่มกด (Button Text)</label>
                    <input type="text" id="btnExploreText">
                </div>
            </div>

            <div class="config-card">
                <div class="card-title"><i class="fa-solid fa-chart-bar"></i> 2. ส่วนข้อมูลตัวเลขสถิติ</div>
                <div class="row-grid">
                    <div class="form-group">
                        <label>สถิติที่ 1 (เช่น 15+)</label>
                        <input type="text" id="stat1_num">
                        <label style="margin-top:5px; font-weight:normal;">คำอธิบาย</label>
                        <input type="text" id="stat1_text">
                    </div>
                    <div class="form-group">
                        <label>สถิติที่ 2 (เช่น 500)</label>
                        <input type="text" id="stat2_num">
                        <label style="margin-top:5px; font-weight:normal;">คำอธิบาย</label>
                        <input type="text" id="stat2_text">
                    </div>
                    <div class="form-group">
                        <label>สถิติที่ 3 (เช่น 100+)</label>
                        <input type="text" id="stat3_num">
                        <label style="margin-top:5px; font-weight:normal;">คำอธิบาย</label>
                        <input type="text" id="stat3_text">
                    </div>
                </div>
            </div>

            <div style="margin-bottom: 50px;">
                <button type="submit" class="btn-submit">
                    <i class="fa-solid fa-floppy-disk"></i> บันทึกข้อมูลทุกส่วนลงหน้าเว็บ
                </button>
            </div>
        </form>
    </div>

<script>
    // โหลดข้อมูลทั้งหมดมาเติมในฟอร์ม
    fetch('/data.json')
        .then(res => res.json())
        .then(data => {
            document.getElementById('title').value = data.title || '';
            document.getElementById('announcement').value = data.announcement || '';
            document.getElementById('btnExploreText').value = data.btnExploreText || 'สำรวจนวัตกรรม';
            
            document.getElementById('stat1_num').value = data.stat1_num || '15+';
            document.getElementById('stat1_text').value = data.stat1_text || 'ปีแห่งประสบการณ์';
            document.getElementById('stat2_num').value = data.stat2_num || '500';
            document.getElementById('stat2_text').value = data.stat2_text || 'โครงการที่สำเร็จ';
            document.getElementById('stat3_num').value = data.stat3_num || '100+';
            document.getElementById('stat3_text').value = data.stat3_text || 'พันธมิตรทั่วโลก';
        });

    // ส่งข้อมูลทั้งหมดไปบันทึก
    document.getElementById('full-admin-form').addEventListener('submit', function(e) {
        e.preventDefault();
        
        const allData = {
            title: document.getElementById('title').value,
            announcement: document.getElementById('announcement').value,
            btnExploreText: document.getElementById('btnExploreText').value,
            stat1_num: document.getElementById('stat1_num').value,
            stat1_text: document.getElementById('stat1_text').value,
            stat2_num: document.getElementById('stat2_num').value,
            stat2_text: document.getElementById('stat2_text').value,
            stat3_num: document.getElementById('stat3_num').value,
            stat3_text: document.getElementById('stat3_text').value
        };

        fetch('/save-data', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(allData)
        })
        .then(res => {
            if (res.ok) alert('🎉 บันทึกและอัปเดตข้อมูลทุกส่วนเรียบร้อยแล้ว!');
            else alert('❌ เกิดข้อผิดพลาด');
        });
    });
</script>
</body>
</html>
