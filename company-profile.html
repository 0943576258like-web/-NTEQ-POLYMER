<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Company Profile - NTEQ POLYMER</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Sarabun', sans-serif; }
        body {
            background: #0b130e;
            color: #ffffff;
            background-image: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.8)), url('https://images.unsplash.com/photo-1448375240586-882707db888b?ixlib=rb-4.0.3&auto=format&fit=crop&w=1920&q=80');
            background-size: cover;
            background-attachment: fixed;
            padding: 120px 8% 40px 8%;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 40px;
            border-radius: 16px;
        }
        h1 { color: #2ecc71; margin-bottom: 20px; font-size: 32px; border-bottom: 2px solid #2ecc71; padding-bottom: 10px; }
        p { font-size: 16px; line-height: 1.8; color: #dddddd; margin-bottom: 30px; }
        .btn-back {
            display: inline-block;
            background: rgba(255,255,255,0.1);
            color: white;
            padding: 10px 25px;
            border-radius: 60px;
            text-decoration: none;
            transition: 0.3s;
            border: 1px solid rgba(255,255,255,0.2);
        }
        .btn-back:hover { background: #2ecc71; border-color: #2ecc71; }
    </style>
</head>
<body>

    <div class="container">
        <h1>Company Profile</h1>
        <p>ยินดีต้อนรับสู่หน้าข้อมูลบริษัท NTEQ POLYMER เราคือผู้นำด้านการวิจัย พัฒนา และผลิตนวัตกรรมยางพารารักษ์โลก (Green Rubber Innovation) ที่มุ่งเน้นกระบวนการผลิตที่เป็นมิตรต่อสิ่งแวดล้อมเพื่อตอบโจทย์อุตสาหกรรมยุคใหม่และการเติบโตอย่างยั่งยืน</p>
        
        <a href="/" class="btn-back"><i class="fa-solid fa-arrow-left"></i> กลับหน้าหลัก</a>
    </div>

</body>
</html>
